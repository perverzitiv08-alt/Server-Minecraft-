<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Helkor Server</title>

<link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Minecraftia', sans-serif;
  background: url('https://i.imgur.com/8kP9Q0K.jpg') no-repeat center/cover;
  color: white;
  text-align: center;
}

.overlay {
  background: rgba(0,0,0,0.8);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  font-size: 40px;
  text-shadow: 3px 3px black;
}

/* Minecraft button styl */
.mc-btn {
  display: inline-block;
  padding: 15px 25px;
  margin: 10px;
  font-size: 14px;
  color: white;
  background: linear-gradient(#727272, #4a4a4a);
  border: 3px solid #2b2b2b;
  box-shadow: inset -3px -3px #2b2b2b, inset 3px 3px #a0a0a0;
  cursor: pointer;
}

.mc-btn:hover {
  background: linear-gradient(#8a8a8a, #5a5a5a);
}

.mc-btn:active {
  box-shadow: inset 3px 3px #2b2b2b, inset -3px -3px #a0a0a0;
}

/* boxy */
.box {
  background: rgba(50,50,50,0.9);
  border: 4px solid #2b2b2b;
  padding: 20px;
  margin: 20px auto;
  width: 80%;
}

/* inputy */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 5px;
  background: #2b2b2b;
  border: 2px solid #555;
  color: white;
}

/* dynmap */
iframe {
  border: 4px solid #2b2b2b;
}

.news {
  text-align: left;
}
</style>
</head>

<body>

<div class="overlay">

<h1>⛏️ HELKOR SERVER ⛏️</h1>

<div class="box">
<h2 id="players">Načítám hráče...</h2>
<p>IP: cz1.helkor.eu:41004</p>

<div>
<button class="mc-btn" onclick="copyIP()">📋 Kopírovat IP</button>
<button class="mc-btn" onclick="window.open('https://discord.gg/t4Caja7V7')">💬 Discord</button>
</div>
</div>

<div class="box">
<h2>📋 Přihláška</h2>

<form action="https://formspree.io/f/tvojeID" method="POST">
<input type="text" name="nick" placeholder="Nick" required><br>
<input type="text" name="pozice" placeholder="Builder/Admin/Helper" required><br>
<textarea name="text" placeholder="Proč chceš do týmu?" required></textarea><br>
<button class="mc-btn" type="submit">Odeslat</button>
</form>
</div>

<div class="box">
<h2>🗺️ Dynmapa</h2>
<iframe src="http://cz1.helkor.eu:41185" width="100%" height="400"></iframe>
</div>

<div class="box news">
<h2>📰 Novinky</h2>
<p>🔥 Server spuštěn</p>
<p>⚔️ Eventy brzy</p>
<p>👑 Nabíráme tým</p>
</div>

</div>

<script>
// hráči
fetch("https://api.mcsrvstat.us/2/cz1.helkor.eu:41004")
.then(res => res.json())
.then(data => {
  document.getElementById("players").innerText =
    "Hráči Online: " + data.players.online + " / " + data.players.max;
});

// copy
function copyIP() {
  navigator.clipboard.writeText("cz1.helkor.eu:41004");
  alert("IP zkopírována!");
}
</script>

</body>
</html>
